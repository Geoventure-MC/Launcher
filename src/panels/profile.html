<div class="profile-content" style="display:flex;flex-direction:column;height:100%;padding:24px;gap:18px;overflow:hidden;">
    <div class="profile-header" style="display:flex;align-items:center;gap:16px;">
        <button class="profile-back-btn" id="profile-back-btn" style="background:rgba(255,255,255,0.08);border:none;color:#fff;border-radius:8px;padding:8px 14px;cursor:pointer;font-size:14px;">←</button>
        <div class="profile-player-head" id="profile-player-head" style="width:56px;height:56px;border-radius:8px;background-size:cover;background-color:rgba(255,255,255,0.06);"></div>
        <div style="flex:1;">
            <div class="profile-player-name" id="profile-player-name" style="font-size:18px;font-weight:600;color:#fff;"></div>
            <div class="profile-player-role" id="profile-player-role" style="font-size:12px;color:#9ca3af;"></div>
        </div>
        <div class="profile-stats" id="profile-stats" style="display:flex;gap:12px;"></div>
    </div>

    <div class="profile-columns" style="display:flex;gap:18px;flex:1;min-height:0;">
        <section class="profile-card" style="flex:1;background:rgba(0,0,0,0.35);border-radius:12px;padding:16px;display:flex;flex-direction:column;min-height:0;">
            <h3 style="margin:0 0 12px;font-size:14px;color:#4ade80;">🏆 <span id="profile-leaderboard-title">Classement joueurs</span></h3>
            <div id="profile-leaderboard" style="flex:1;overflow-y:auto;font-size:13px;color:#e5e7eb;">
                <div class="profile-empty">Chargement…</div>
            </div>
        </section>

        <section class="profile-card" style="flex:1;background:rgba(0,0,0,0.35);border-radius:12px;padding:16px;display:flex;flex-direction:column;min-height:0;">
            <h3 style="margin:0 0 12px;font-size:14px;color:#a78bfa;">🏰 <span id="profile-factions-title">Factions</span></h3>
            <div id="profile-factions" style="flex:1;overflow-y:auto;font-size:13px;color:#e5e7eb;">
                <div class="profile-empty">Chargement…</div>
            </div>
        </section>
    </div>
</div>
