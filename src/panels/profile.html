<div class="profile-content">
    <div class="profile-header">
        <button class="profile-back-btn" id="profile-back-btn">&larr;</button>
        <div class="profile-player-head" id="profile-player-head"></div>
        <div style="flex:1;">
            <div class="profile-player-name" id="profile-player-name"></div>
            <div class="profile-player-role" id="profile-player-role"></div>
        </div>
        <div class="profile-stats" id="profile-stats"></div>
    </div>

    <div class="profile-columns">
        <section class="profile-card profile-card-leaderboard">
            <h3><span id="profile-leaderboard-title">Classement joueurs</span></h3>
            <div class="profile-leaderboard-scroll">
                <div id="profile-season-banner" class="profile-season-banner" hidden></div>
                <div id="profile-season-standings" class="profile-season-standings" hidden></div>
                <div id="profile-leaderboard">
                    <div class="profile-empty">Chargement…</div>
                </div>
                <div id="profile-season-hall" class="profile-season-hall" hidden></div>
            </div>
        </section>

        <section class="profile-card profile-card-factions">
            <h3><span id="profile-factions-title">Factions</span></h3>
            <div id="profile-factions">
                <div class="profile-empty">Chargement…</div>
            </div>
        </section>

        <section class="profile-card profile-card-playstats">
            <h3><span id="profile-playstats-title">📈 Mes stats</span></h3>
            <div id="profile-playstats">
                <div class="profile-empty">Chargement…</div>
            </div>
        </section>

        <section class="profile-card profile-card-skin">
            <h3><span id="profile-skin-title">🧍 Mon skin</span></h3>
            <div class="profile-skin-body">
                <iframe frameborder="0" id="profile-skin-viewer" class="profile-skin-viewer" src=""></iframe>
                <button class="profile-skin-btn" id="profile-skin-change">Changer de skin</button>
                <input type="file" id="profile-skin-file" accept="image/png" style="display: none;">
                <div class="profile-skin-status" id="profile-skin-status"></div>
            </div>
        </section>
    </div>

    <section class="profile-card profile-card-achievements">
        <h3>
            <span id="profile-achievements-title">Succès</span>
            <span class="profile-achievements-points" id="profile-achievements-points"></span>
        </h3>
        <div id="profile-achievements">
            <div class="profile-empty">Chargement…</div>
        </div>
    </section>
</div>

<div class="achievement-toast-stack" id="achievement-toast-stack"></div>
