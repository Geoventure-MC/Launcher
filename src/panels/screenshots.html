<div class="screenshots-content">
    <div class="screenshots-header">
        <button class="screenshots-back-btn" id="screenshots-back-btn">&larr;</button>
        <div style="flex:1;">
            <div class="screenshots-title" id="screenshots-title">📷 Captures d'écran</div>
            <div class="screenshots-subtitle" id="screenshots-subtitle"></div>
        </div>
        <button class="screenshots-folder-btn" id="screenshots-folder-btn">Ouvrir le dossier</button>
    </div>

    <div class="screenshots-grid" id="screenshots-grid">
        <div class="screenshots-empty" id="screenshots-empty" style="display:none;"></div>
    </div>

    <div class="screenshots-more-wrap">
        <button class="screenshots-more-btn" id="screenshots-more-btn" style="display:none;">Afficher plus</button>
    </div>

    <!-- Visionneuse plein écran -->
    <div class="screenshots-viewer" id="screenshots-viewer" style="display:none;">
        <img id="screenshots-viewer-img" alt="">
        <div class="screenshots-viewer-bar">
            <span id="screenshots-viewer-name"></span>
            <button id="screenshots-viewer-delete">🗑 Supprimer</button>
            <button id="screenshots-viewer-close">✕</button>
        </div>
    </div>
</div>
