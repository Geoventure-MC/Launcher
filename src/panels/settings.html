<link rel='stylesheet' href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.1.1/css/all.min.css">
<link href="https://fonts.googleapis.com/css2?family=Roboto+Mono:ital,wght@0,100..700;1,100..700&display=swap"
    rel="stylesheet">
<div class="settings-content">
    <div class="tabs-settings-btn">
        <button style="margin-top: 40px;" class="tab-btn-css tab-btn active-tab-btn default-tab-btn"
            id="accounts-tab"></button>
        <button class="tab-btn-css tab-btn" id="ram-tab"></button>
        <button class="tab-btn-css tab-btn" id="launch-tab"></button>
        <button class="tab-btn-css tab-btn" id="mods-tab"></button>
        <button class="tab-btn-css tab-btn" id="skin-tab"></button>
        <button class="tab-btn-css tab-btn" id="advanced-tab"></button>
        <button class="tab-btn-css tab-btn" id="community-tab"></button>
        <button class="tab-btn-css save-tabs-btn" id="save-tab"></button>
    </div>

    <div class="tabs-settings-content active-tab-content">
        <div class="center-align">
            <button class="add-account" id="add-account-btn"></button>
            <div class="accounts"></div>
        </div>
    </div>

    <div class="tabs-settings-content">
        <div class="settings-content-scroll">
            <div class="title-settings" id="ram-title"></div>
            <div class="java-settings">
                <div class="information" id="ram-info"></div>
                <div class="ram-info">
                    <div class="memory-slider" min="0.5" max="8" step="0.5">
                        <div class="slider-touch-left">
                            <span value="0 Go"></span>
                        </div>
                        <div class="slider-touch-right">
                            <span value="0 Go"></span>
                        </div>
                        <div class="slider-line">
                            <span></span>
                        </div>
                    </div>

                    <div class="ram-info-block">
                        <span id="total-ram"></span><br>
                        <span id="free-ram"></span>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <div class="tabs-settings-content">
        <div class="center-page">
            <div class="title-settings" id="launch-title"></div>
            <div class="java-settings launch-options-container">
                <div class="launch-options">
                    <div class="launch-option" data-tooltip-id="close-launcher-text">
                        <input type="checkbox" class="checkbox-settings" id="launcher-close">
                        <label for="launcher-close" class="launch-icon-btn">
                            <i class="fas fa-window-minimize"></i>
                        </label>
                        <span class="launch-tooltip" id="close-launcher-text"></span>
                    </div>
                    <div class="launch-option" data-tooltip-id="close-all-text">
                        <input type="checkbox" class="checkbox-settings" id="launcher-close-all">
                        <label for="launcher-close-all" class="launch-icon-btn">
                            <i class="fas fa-times-circle"></i>
                        </label>
                        <span class="launch-tooltip" id="close-all-text"></span>
                    </div>
                    <div class="launch-option" data-tooltip-id="open-launcher-text">
                        <input type="checkbox" class="checkbox-settings" id="launcher-open">
                        <label for="launcher-open" class="launch-icon-btn">
                            <i class="fas fa-window-restore"></i>
                        </label>
                        <span class="launch-tooltip" id="open-launcher-text"></span>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>
<div class="tabs-settings-content">
    <div class="settings-content-scroll">
        <div class="center-page">
            <div class="title-settings" id="mods-title"></div>
            <div class="mods-info">
                <div class="information" id="mods-info"></div>
                <div class="mods-list" id="mods-list"></div>
            </div>
        </div>
    </div>
</div>
<div class="tabs-settings-content">
    <div class="player-skin-title title-settings" id="skin-title"></div>
    <div class="center-page">
        <div class="skin-section-layout">
            <div class="skin-preview-container">
                <iframe frameborder="0" id="skinRender2" class="skin-renderer-settings"
                    style="border: none; width: 319px; height: 221px;" src=""></iframe>
            </div>
            <div class="skin-upload-container">
                <input type="file" id="fileInput" accept="image/png" style="display: none;">
                <div class="skin-dropzone" id="skinDropzone">
                    <div class="dropzone-content">
                        <i class="fas fa-cloud-upload-alt dropzone-icon"></i>
                        <div class="dropzone-text" id="dropzone-text"></div>
                        <div class="dropzone-subtext"></div>
                        <div class="dropzone-requirements"></div>
                    </div>
                    <div class="dropzone-hover-state">
                        <i class="fas fa-check-circle"></i>
                        <span></span>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>

<div class="tabs-settings-content">
    <div class="settings-content-scroll">
        <div class="center-page">
            <div class="title-settings" id="advanced-title">Avancé</div>
            <div class="java-settings">
                <div class="advanced-section">
                    <h3 id="game-folder-title">Dossier de jeu</h3>
                    <button class="btn-advanced" id="open-folder-btn">
                        <i class="fas fa-folder-open"></i>
                        <span id="open-folder-text">Ouvrir le dossier</span>
                    </button>
                </div>
                <div class="advanced-section">
                    <h3 id="resolution-title">Résolution</h3>
                    <div class="resolution-settings">
                        <select id="select" class="resolution-select">
                            <option value="">Choisir une résolution</option>
                            <option value="854 x 480">854 x 480</option>
                            <option value="1280 x 720">1280 x 720 (HD)</option>
                            <option value="1920 x 1080">1920 x 1080 (Full HD)</option>
                            <option value="2560 x 1440">2560 x 1440 (2K)</option>
                        </select>
                        <div class="resolution-inputs">
                            <input type="number" class="width-size resolution-input" placeholder="Largeur" min="640" max="3840">
                            <span>×</span>
                            <input type="number" class="height-size resolution-input" placeholder="Hauteur" min="480" max="2160">
                        </div>
                    </div>
                </div>
                <div class="advanced-section">
                    <h3 id="privacy-title">Confidentialité</h3>
                    <div class="launch-option">
                        <input type="checkbox" class="checkbox-settings" id="telemetry-consent">
                        <label for="telemetry-consent" id="telemetry-consent-label">Partager des statistiques anonymes d'utilisation</label>
                    </div>
                </div>
                <div class="advanced-section">
                    <h3 id="repair-title">🔧 Réparer l'installation</h3>
                    <div class="repair-info" id="repair-info"></div>
                    <button class="btn-advanced" id="repair-btn">
                        <i class="fas fa-wrench"></i>
                        <span id="repair-btn-text">Réparer</span>
                    </button>
                    <div class="repair-status" id="repair-status" style="display: none;"></div>
                </div>
            </div>
        </div>
    </div>
</div>

<div class="tabs-settings-content">
    <div class="settings-content-scroll">
        <div class="center-page">
            <div class="title-settings" id="community-title">Mods Communauté</div>
            <div class="mods-info">
                <div class="information" id="community-info"></div>
                <div class="community-toolbar" id="community-toolbar" style="display: none;">
                    <div class="community-search">
                        <span class="community-search-icon">&#128269;</span>
                        <input type="text" id="community-search-input" class="community-search-input" autocomplete="off">
                    </div>
                    <div class="community-filters" id="community-filters"></div>
                </div>
                <div class="mods-list" id="community-mods-list"></div>
            </div>
        </div>
    </div>
</div>
</div>
