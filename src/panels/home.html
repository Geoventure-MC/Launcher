<style class="bodyimg"></style>
<div class="home-content">
    <!-- Feature 4: Panel notifications banner -->
    <div id="notifications-banner" class="notifications-banner" style="display:none;"></div>

    <aside class="sidebar">
        <div class="sidebar-top">
            <div class="player-avatar-wrapper">
                <div class="player-head"></div>
                <div class="player-tooltip">
                    <div class="player-tooltip-role"></div>
                    <div class="player-monnaie"></div>
                </div>
            </div>
            <div class="player-role"></div>
        </div>
        <div class="sidebar-servers" id="server-selector"></div>
        <div class="sidebar-middle">
            <div class="play-element">
                <button class="play-btn" id="play-btn"></button>
                <div class="download-content">
                    <div class="text-download" id="text-download"></div>
                    <div class="download-file" id="download-file"></div>
                    <progress value="0" max="0" class="progress-bar"></progress>
                </div>
            </div>
        </div>
        <div class="sidebar-bottom">
            <button class="log-toggle-btn icon-terminal" id="log-toggle-btn" style="display:none;" title="Console"></button>
            <button class="profile-btn" id="profile-btn" title="Profil"><i class="fas fa-user-astronaut"></i></button>
            <button class="settings-btn icon-settings" id="settings-btn"></button>
        </div>
    </aside>

    <main class="main-content">
        <section class="news-section">
            <div class="news-list"></div>
        </section>

        <aside class="info-section">
            <div class="info-item">
                <div class="server">
                    <img class="server-img" />
                    <div class="server-text">
                        <div class="name" id="server-name"></div>
                        <div class="desc" id="server-desc"></div>
                    </div>
                    <div class="etat-text">
                        <div class="text" id="players-connected"></div>
                        <div class="online off"></div>
                    </div>
                </div>
            </div>
            <div class="info-item ytb-container">
                <div class="ytb">
                    <div class="ytb-header">
                        <div class="header-text">
                            <div class="title-change" id="video-title"></div>
                        </div>
                    </div>
                    <div class="video">
                        <div class="youtube-thumbnail">
                            <img class="thumbnail-img" alt="YouTube Thumbnail" />
                            <button class="ytb-play-btn" id="play-video-btn"></button>
                        </div>
                        <div class="video-credits"></div>
                        <div class="icon-ytb ytb-btn" id="view-video-btn"></div>
                    </div>
                </div>
            </div>
        </aside>

        <div class="advert-banner" id="advert-banner" style="display:none;"></div>
    </main>

    <!-- Log Console -->
    <div class="log-console" id="log-console">
        <div class="log-header">
            <span class="log-title">Console Minecraft</span>
            <div class="log-actions">
                <button class="log-btn" id="log-clear-btn">Effacer</button>
                <button class="log-btn log-close" id="log-close-btn">&times;</button>
            </div>
        </div>
        <div class="log-body" id="log-body"></div>
    </div>

    <!-- Anti-Cheat Modal -->
    <div class="cheat-modal-overlay" id="cheat-modal-overlay" style="display:none;">
        <div class="cheat-modal">
            <div class="cheat-modal-icon">&#9888;&#65039;</div>
            <h2 id="cheat-modal-title"></h2>
            <p id="cheat-modal-desc"></p>
            <div class="cheat-list" id="cheat-list"></div>
            <div class="cheat-modal-actions">
                <button class="cheat-btn-remove" id="cheat-remove-btn"></button>
                <button class="cheat-btn-cancel" id="cheat-cancel-btn"></button>
            </div>
        </div>
    </div>
</div>
