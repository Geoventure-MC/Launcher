<style class="bodyimg"></style>
<div class="home-content">
    <!-- Offline mode badge -->
    <div id="offline-badge" style="display:none;position:fixed;top:8px;right:12px;z-index:9999;background:rgba(239,68,68,0.9);color:#fff;font-size:11px;padding:3px 10px;border-radius:12px;pointer-events:none;">Hors ligne</div>
    <!-- Panel notifications banner -->
    <div id="notifications-banner" class="notifications-banner" style="display:none;"></div>

    <aside class="sidebar">
        <div class="sidebar-top">
            <div class="player-avatar-wrapper">
                <div class="player-head"></div>
                <div class="player-tooltip">
                    <div class="player-tooltip-role"></div>
                    <div class="player-monnaie"></div>
                </div>
            </div>
            <div class="player-role"></div>
        </div>
        <div class="sidebar-server-name" id="sidebar-server-name"></div>
        <div class="sidebar-servers" id="server-selector"></div>
        <div class="sidebar-middle">
            <div class="play-element">
                <button class="play-btn" id="play-btn"></button>
                <div class="download-content">
                    <div class="text-download" id="text-download"></div>
                    <div class="download-file" id="download-file"></div>
                    <progress value="0" max="0" class="progress-bar"></progress>
                </div>
            </div>
        </div>
        <div class="sidebar-bottom">
            <button class="instance-back-btn" id="instance-back-btn" title="Changer de serveur" aria-label="Changer de serveur">
                <span class="instance-back-icon">&larr;</span>
            </button>
            <button class="log-toggle-btn icon-terminal" id="log-toggle-btn" style="display:none;" title="Console" aria-label="Console"></button>
            <button class="changelog-btn sidebar-icon-btn" id="changelog-btn" title="Nouveautés" aria-label="Nouveautés">
                <svg viewBox="0 0 24 24" width="20" height="20" fill="none" stroke="currentColor" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M14 3H7a1.5 1.5 0 0 0-1.5 1.5v15A1.5 1.5 0 0 0 7 21h10a1.5 1.5 0 0 0 1.5-1.5V7.5z"/><path d="M14 3v4.5h4.5"/><path d="M8.5 12.5h7M8.5 16h5"/></svg>
            </button>
            <button class="profile-btn sidebar-icon-btn" id="profile-btn" title="Profil" aria-label="Profil">
                <svg viewBox="0 0 24 24" width="20" height="20" fill="none" stroke="currentColor" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><circle cx="12" cy="8" r="3.5"/><path d="M5 19.5c0-3.6 3.1-5.5 7-5.5s7 1.9 7 5.5"/></svg>
            </button>
            <button class="settings-btn icon-settings" id="settings-btn" title="Réglages" aria-label="Réglages"></button>
        </div>
    </aside>

    <main class="main-content">
        <!-- NEWS Hero Section -->
        <section class="news-hero-section" id="news-hero-section">
            <div class="news-hero-card" id="news-hero-card">
                <div class="news-hero-bg" id="news-hero-bg"></div>
                <div class="news-hero-overlay"></div>
                <div class="news-hero-body">
                    <div class="news-hero-badge" id="news-hero-badge">ACTUALITÉ</div>
                    <h2 class="news-hero-title" id="news-hero-title"></h2>
                    <p class="news-hero-desc" id="news-hero-desc"></p>
                </div>
                <div class="news-hero-nav" id="news-hero-nav"></div>
            </div>
        </section>

        <!-- Shortcuts Row -->
        <section class="shortcuts-section" id="shortcuts-section">
            <div class="shortcuts-header">
                <span class="shortcuts-title" id="shortcuts-title">RACCOURCIS</span>
            </div>
            <div class="shortcuts-row" id="shortcuts-row"></div>
        </section>

        <!-- Content Grid: Discover + Info sidebar -->
        <div class="content-grid">
            <section class="discover-section" id="discover-section">
                <div class="discover-header">
                    <span class="discover-title" id="discover-title">À DÉCOUVRIR</span>
                </div>
                <div class="discover-cards" id="discover-cards"></div>
            </section>

            <aside class="info-section">
                <div class="info-item">
                    <div class="server">
                        <img class="server-img" />
                        <div class="server-text">
                            <div class="name" id="server-name"></div>
                            <div class="desc" id="server-desc"></div>
                        </div>
                        <div class="etat-text">
                            <div class="text" id="players-connected"></div>
                            <div class="online off"></div>
                        </div>
                    </div>
                </div>
                <div class="info-item upcoming-events" id="upcoming-events" style="display:none;"></div>
                <div class="info-item ytb-container">
                    <div class="ytb">
                        <div class="ytb-header">
                            <div class="header-text">
                                <div class="title-change" id="video-title"></div>
                            </div>
                        </div>
                        <div class="video">
                            <div class="youtube-thumbnail">
                                <img class="thumbnail-img" alt="YouTube Thumbnail" />
                                <button class="ytb-play-btn" id="play-video-btn" title="Lire la vidéo" aria-label="Lire la vidéo"></button>
                            </div>
                            <div class="video-credits"></div>
                            <div class="icon-ytb ytb-btn" id="view-video-btn"></div>
                        </div>
                    </div>
                </div>
            </aside>
        </div>

        <div class="advert-banner" id="advert-banner" style="display:none;"></div>
    </main>

    <!-- Log Console -->
    <div class="log-console" id="log-console">
        <div class="log-header">
            <span class="log-title" id="log-title">Console Minecraft</span>
            <div class="log-actions">
                <button class="log-btn log-btn-active" id="log-autoscroll-btn" title="Défilement automatique">Auto</button>
                <button class="log-btn" id="log-copy-btn">Copier</button>
                <button class="log-btn" id="log-export-btn">Exporter</button>
                <button class="log-btn" id="log-clear-btn">Effacer</button>
                <button class="log-btn log-close" id="log-close-btn">&times;</button>
            </div>
        </div>
        <div class="log-body" id="log-body"></div>
    </div>

    <!-- What's New Modal (panel-driven changelog) -->
    <div class="whatsnew-modal-overlay" id="whatsnew-modal-overlay" style="display:none;">
        <div class="whatsnew-modal">
            <div class="whatsnew-modal-head">
                <span class="whatsnew-modal-icon">&#128203;</span>
                <h2 id="whatsnew-modal-title"></h2>
                <span class="whatsnew-modal-version" id="whatsnew-modal-version"></span>
            </div>
            <div class="whatsnew-modal-body" id="whatsnew-modal-body"></div>
            <div class="whatsnew-modal-actions">
                <button class="whatsnew-close-btn" id="whatsnew-close-btn"></button>
            </div>
        </div>
    </div>

    <!-- Anti-Cheat Modal -->
    <div class="cheat-modal-overlay" id="cheat-modal-overlay" style="display:none;">
        <div class="cheat-modal">
            <div class="cheat-modal-icon">&#9888;&#65039;</div>
            <h2 id="cheat-modal-title"></h2>
            <p id="cheat-modal-desc"></p>
            <div class="cheat-list" id="cheat-list"></div>
            <div class="cheat-modal-actions">
                <button class="cheat-btn-remove" id="cheat-remove-btn"></button>
                <button class="cheat-btn-cancel" id="cheat-cancel-btn"></button>
            </div>
        </div>
    </div>
</div>
