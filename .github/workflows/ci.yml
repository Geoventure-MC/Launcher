name: Launcher Build & Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  prepare:
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.version.outputs.version }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Determine version
        id: version
        run: |
          if [[ "${{ github.ref_type }}" == "tag" ]]; then
            TAG_VERSION="${{ github.ref_name }}"
            TAG_VERSION="${TAG_VERSION#v}"
            npm version "$TAG_VERSION" --no-git-tag-version --allow-same-version
            echo "version=$TAG_VERSION" >> $GITHUB_OUTPUT
            echo "Using tag version: $TAG_VERSION"
          else
            VERSION=$(node -p "require('./package.json').version")
            echo "version=$VERSION" >> $GITHUB_OUTPUT
            echo "Using package.json version: $VERSION"
          fi

  build-launcher:
    needs: prepare
    runs-on: ${{ matrix.os }}
    timeout-minutes: 45
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-2022
          - os: macos-15
          - os: macos-13
          - os: ubuntu-22.04

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: 'npm'

      - uses: actions/setup-python@v5
        with:
          python-version: 3.x

      - name: Set version from tag
        if: github.ref_type == 'tag'
        run: |
          TAG_VERSION="${{ github.ref_name }}"
          TAG_VERSION="${TAG_VERSION#v}"
          npm version "$TAG_VERSION" --no-git-tag-version --allow-same-version
        shell: bash

      - name: Install Linux dependencies
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libgtk-3-0 libgtk-3-dev \
            libwebkit2gtk-4.0-dev \
            libappindicator3-dev \
            librsvg2-dev \
            patchelf \
            fakeroot \
            rpm

      - name: Install dependencies
        run: npm ci
        shell: bash

      - name: Build and publish
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: npm run build -- --publish always
        shell: bash

  create-release-notes:
    needs: [prepare, build-launcher]
    runs-on: ubuntu-latest
    steps:
      - uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ needs.prepare.outputs.version }}
          name: "Conflictura Launcher v${{ needs.prepare.outputs.version }}"
          body: |
            ## Conflictura Launcher v${{ needs.prepare.outputs.version }}

            ### Téléchargement

            | Plateforme | Fichier |
            |---|---|
            | **Windows** | `Conflictura Launcher Setup ${{ needs.prepare.outputs.version }}.exe` |
            | **macOS Apple Silicon** | `Conflictura Launcher-${{ needs.prepare.outputs.version }}-arm64.dmg` |
            | **macOS Intel** | `Conflictura Launcher-${{ needs.prepare.outputs.version }}.dmg` |
            | **Linux** | `Conflictura Launcher-${{ needs.prepare.outputs.version }}.AppImage` |

            ### Mise à jour automatique
            Si tu as déjà le launcher installé, il se met à jour automatiquement au prochain démarrage — pas besoin de réinstaller.

            ---
          generate_release_notes: true
          append_body: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
