name: Launcher Build & Release

on:
  push:
    branches: [ master ]

permissions:
  contents: write

jobs:
  version-bump:
    runs-on: ubuntu-latest
    outputs:
      sha: ${{ steps.push.outputs.sha }}
      version: ${{ steps.push.outputs.version }}
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          fetch-depth: 0

      - uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Configure git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

      - name: Bump patch version
        id: push
        run: |
          npm version patch --no-git-tag-version
          NEW_VERSION=$(node -p "require('./package.json').version")
          git add package.json
          git commit -m "chore: bump version to v$NEW_VERSION [skip ci]"
          git push origin master
          echo "sha=$(git rev-parse HEAD)" >> $GITHUB_OUTPUT
          echo "version=$NEW_VERSION" >> $GITHUB_OUTPUT
          echo "Bumped to v$NEW_VERSION"

  build-launcher:
    needs: version-bump
    runs-on: ${{ matrix.os }}
    timeout-minutes: 45
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-2022
          - os: macos-15
          - os: macos-13
          - os: ubuntu-22.04

    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ needs.version-bump.outputs.sha }}

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: 'npm'

      - uses: actions/setup-python@v5
        with:
          python-version: 3.x

      - name: Install Linux dependencies
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libgtk-3-0 libgtk-3-dev \
            libwebkit2gtk-4.0-dev \
            libappindicator3-dev \
            librsvg2-dev \
            patchelf \
            fakeroot \
            rpm

      - name: Install dependencies
        run: npm ci
        shell: bash

      - name: Build and publish
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: npm run build -- --publish always
        shell: bash

  create-release-notes:
    needs: [version-bump, build-launcher]
    runs-on: ubuntu-latest
    steps:
      - uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ needs.version-bump.outputs.version }}
          name: "Conflictura Launcher v${{ needs.version-bump.outputs.version }}"
          body: |
            ## Conflictura Launcher v${{ needs.version-bump.outputs.version }}

            ### Téléchargement

            | Plateforme | Fichier |
            |---|---|
            | **Windows** | `Conflictura Launcher Setup ${{ needs.version-bump.outputs.version }}.exe` |
            | **macOS Apple Silicon** | `Conflictura Launcher-${{ needs.version-bump.outputs.version }}-arm64.dmg` |
            | **macOS Intel** | `Conflictura Launcher-${{ needs.version-bump.outputs.version }}.dmg` |
            | **Linux** | `Conflictura Launcher-${{ needs.version-bump.outputs.version }}.AppImage` |

            ### Mise à jour automatique
            Si tu as déjà le launcher installé, il se met à jour automatiquement au prochain démarrage — pas besoin de réinstaller.

            ---
          generate_release_notes: true
          append_body: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
